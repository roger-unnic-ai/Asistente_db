services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: asistente_db_prod
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # NO exponemos puertos directamente en producción
    # La aplicación debe conectarse a través de la red interna de Docker
    expose:
      - "5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backups:/backups  # Para backups manuales
    networks:
      - asistente_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    # Límites de recursos para producción
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    # Configuraciones adicionales de seguridad
    command: 
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=2621kB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "log_destination=stderr"
      - "-c"
      - "logging_collector=on"
      - "-c"
      - "log_directory=/var/log/postgresql"
      - "-c"
      - "log_filename=postgresql-%Y-%m-%d.log"
      - "-c"
      - "log_rotation_age=1d"
      - "-c"
      - "log_rotation_size=100MB"

  # ⭐ NUEVO SERVICIO: WEBAPP
  webapp:
    build:
      context: ../../RAG-Webapp-database/RAG-Webapp-database  # Ajusta esta ruta según dónde esté tu Dockerfile
      dockerfile: Dockerfile
    container_name: rag_webapp_prod
    env_file:
      - .env
    environment:
      # ✅ Usa "postgres" como hostname (nombre del servicio)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-}
    ports:
      - "5000:5000"  # Exponer al host para acceso externo
    volumes:
      - webapp_models:/app/models  # Persistir modelos FAISS entrenados
      - webapp_logs:/app/logs      # Persistir logs (opcional)
    networks:
      - asistente_network
    depends_on:
      postgres:
        condition: service_healthy  # ✅ Espera a que PostgreSQL esté listo
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Más tiempo por el lazy loading
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G  # Más memoria para modelos ML
        reservations:
          cpus: '1.0'
          memory: 2G

volumes:
  postgres_data_prod:
    driver: local
  webapp_models:
    driver: local
  webapp_logs:
    driver: local

networks:
  asistente_network:
    driver: bridge